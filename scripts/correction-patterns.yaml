# Correction Pattern Configuration
#
# Detects when the user is correcting, redirecting, or expressing
# frustration with Claude's output. The nudge system uses these to
# flag high-priority learnings for capture at session end.
#
# Each category has a list of Python regex patterns (case-insensitive).
# Patterns are tested against the user's prompt text.
#
# Confidence levels:
#   high   — Fire correction nudge immediately (>=0.90 precision)
#   medium — Fire only if 2+ signals detected within consecutive_window turns
#   low    — Track for baseline analysis, don't trigger nudges
#
# To add a pattern: append a regex string to the relevant category.
# To disable a pattern: comment it out with #.
# To test: run the memory retrieval eval suite after changes.

correction_nudge:
  # Minimum turns between correction nudges (avoids nagging during multi-turn fixes)
  cooldown_turns: 3
  # How many recent turns to scan for consecutive signals
  consecutive_window: 3
  # Number of signals in window to escalate the nudge message
  escalation_threshold: 2
  # Max correction history entries to keep per session (prevents unbounded growth)
  max_history: 50

categories:
  # ──────────────────────────────────────────────────────────
  # EXPLICIT CORRECTIONS — Direct "you got it wrong" signals
  # Precision: ~95%. Nearly always a genuine correction.
  # ──────────────────────────────────────────────────────────
  explicit_corrections:
    confidence: high
    description: "Direct statements that something is wrong"
    patterns:
      # "nope" — a common short correction word. ~100% precision.
      - "^nope\\b"
      # "No, [redirect]" — "No, that's not what I asked", "No, hold on"
      - "^no[,.]?\\s+(that|I|it|the|this|we|hold|don't|wait)"
      # "I meant X" — correcting a misunderstanding
      - "\\bI meant\\b"
      # "not what I said/asked/wanted"
      - "not what (I|i) (said|asked|meant|wanted|need)"
      # "that's wrong/incorrect/not right"
      - "that'?s (wrong|not right|incorrect|not what|not how)"
      # "doesn't sound right"
      - "doesn'?t sound right"
      # "you misunderstood/misread/got wrong"
      - "you (misunderstood|misread|missed the|got.{0,5}wrong)"
      # "not quite"
      - "not quite"

  # ──────────────────────────────────────────────────────────
  # FRUSTRATION SIGNALS — User unhappy with output or repeated errors
  # Precision: ~90%. High signal when present.
  # ──────────────────────────────────────────────────────────
  frustration_signals:
    confidence: high
    description: "Frustration with repeated mistakes or output quality"
    patterns:
      # "still the same/not working/broken/messed up" — unfixed issue
      - "still (the same|same|not |doesn|isn|broken|wrong|looks|pretty|messed|ugly|terrible)"
      # "no change/nothing changed/same problem"
      - "no change|nothing changed|same problem"
      # "you keep [doing X]" — repeated mistake complaint
      - "you keep|you'?re (still|always|again)"
      # "why are we still [doing X]"
      - "why are we still"
      # "I already told/said/mentioned" — information loss frustration
      - "(I|we) already (told|said|mentioned|explained)"
      # Expletives and interjections
      - "what the (heck|hell|f)"
      - "oh ffs|\\bugh\\b|c'?mon"
      # "not even close/not remotely"
      - "not (even )?(close|remotely|anywhere near)"
      # "how are you still getting this wrong"
      - "how (are|did) you (still|.{0,20}(wrong|fail|getting))"
      # "I've told you [N times]"
      - "I'?ve told you"
      # "please stop/don't"
      - "please (don'?t|stop)"

  # ──────────────────────────────────────────────────────────
  # REDIRECTIONS — Steering conversation back on track
  # Precision: ~75%. Some false positives in normal conversation.
  # Medium confidence: only fires if combined with another signal.
  # ──────────────────────────────────────────────────────────
  redirections:
    confidence: medium
    description: "Steering conversation toward what actually matters"
    patterns:
      # "just do/use/try/transcribe X" or "stop trying/doing"
      - "^(just|stop)\\s+(do|use|try|run|make|add|fix|go|get|read|write|check|send|put|give|show|move|copy|set|call|open|load|start|build|test|push|pull|transcribe|trying|doing)"
      # "let's focus/go back/not"
      - "let'?s (focus|go back|get back|not)\\b"
      # "forget about/that/it"
      - "forget (about|that|it)\\b"
      # "never mind" / "nvm"
      - "never ?mind|^nvm\\b"
      # "overcomplicating/over-engineering"
      - "overcomplicat|over.?engineer"
      # "skip that/this/it"
      - "skip (that|this|it)\\b"
      # "take a step back"
      - "take a step back"
      # "no, don't [do that]"
      - "^no[,.]?\\s+don'?t"
      # "stop trying [X]"
      - "stop trying"

  # ──────────────────────────────────────────────────────────
  # SOFT CORRECTIONS — Gentle disagreements and course adjustments
  # Precision: ~70%. Context-dependent.
  # Medium confidence: only fires if combined with another signal.
  # ──────────────────────────────────────────────────────────
  soft_corrections:
    confidence: medium
    description: "Gentle course corrections and clarifications"
    patterns:
      # "actually, [correction]" at sentence start
      - "^actually[,.]"
      # "wait, [objection]" at sentence start
      - "^wait[,.]"
      # "I don't think that's right/we should"
      - "don'?t think (that|it|this|we|you|so|any)"
      # "doesn't make sense/work/apply"
      - "doesn'?t (make sense|work|apply|matter|help)"
      # "why would we/you/I"
      - "why would (we|you|I|that|it)"
      # "are you sure"
      - "are you sure"
      # "isn't useful/helpful/right"
      - "isn'?t (useful|helpful|right|correct)"

  # ──────────────────────────────────────────────────────────
  # APPROVAL SIGNALS — Positive feedback (tracked for baseline)
  # NOT used to trigger nudges. Tracked for future analysis:
  # a drop in approval + rise in correction = session going sideways.
  # ──────────────────────────────────────────────────────────
  approval:
    confidence: low
    description: "Positive signals — tracked for contrast, not nudge triggers"
    patterns:
      - "^go ahead"
      - "^ok[,. ]+(let'?s|go|do|launch|done)"
      - "^yes[,!. ]*(exactly|perfect|do|that|let)"
      - "^looks good|^lgtm"
      - "good (thinking|call|point|idea|catch|question)"
      - "^approved"
      - "^that'?s (right|correct|it|perfect|great|exactly)"
